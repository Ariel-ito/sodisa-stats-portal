name: Deploy Portal to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # standalone mode requires static assets to be copied manually
      - name: Prepare standalone package
        run: |
          cp -r public .next/standalone/public
          cp -r .next/static .next/standalone/.next/static

      # Oryx detects package.json and runs `npm start` → `next start`, but next
      # is not bundled in standalone. Patch the start script so Oryx runs
      # `node server.js` instead.
      - name: Patch start script for Azure Oryx
        run: |
          node -e "
            const fs = require('fs');
            const path = '.next/standalone/package.json';
            const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
            pkg.scripts = { ...pkg.scripts, start: 'node server.js' };
            fs.writeFileSync(path, JSON.stringify(pkg, null, 2));
          "

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: app-sodisa-stats-portal
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_PORTAL }}
          package: .next/standalone

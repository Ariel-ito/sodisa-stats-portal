name: Deploy Portal to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # standalone mode requires static assets to be copied manually
      - name: Prepare standalone package
        run: |
          cp -r public .next/standalone/public
          cp -r .next/static .next/standalone/.next/static

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: app-sodisa-stats-portal
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_PORTAL }}
          package: .next/standalone
          startup-command: "node server.js"
